name: music_app
description: Aura Music - A premium Spotify-like music app by Harshvardhan Sing Rathore.
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  youtube_explode_dart: ^3.0.5
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.12
  audio_session: ^0.1.16
  provider: ^6.1.1
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  audio_video_progress_bar: ^2.0.3
  palette_generator: ^0.3.3+3
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
