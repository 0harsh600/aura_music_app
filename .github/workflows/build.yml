name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Generate platform scaffold (preserving our files)
        run: |
          # Back up our custom AndroidManifest
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml.bak
          
          # Generate missing platform files
          flutter create --project-name music_app .
          
          # Restore our custom AndroidManifest (with INTERNET permission + audio service)
          cp /tmp/AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Music-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 0
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.1.0"
          name: "Aura Music v2.1.0 - Network Fix"
          body: "FIXED: App can now access the internet. Added INTERNET permission, background audio service. All features working."
          files: build/app/outputs/flutter-apk/app-release.apk
